function reg(fn){ if(typeof fn !== 'function') return ''; const id = 'h'+(hid++); H[id] = fn; return id; }

  allCampaigns(){ return this.state.added ? this.CAMPAIGNS.concat([this.IMPORTED]) : this.CAMPAIGNS; },
  findCampaign(id){ return this.allCampaigns().find(c => c.id === id); },
  findFlight(id){ for(const c of this.allCampaigns()){ const f = c.flights.find(x => x.id === id); if(f) return {f, c}; } return null; },

  setRole(r){ this.setState({role:r}); },
  goOverview(){ this.setState({screen:'overview',campaignId:null,flightId:null}); },
  goCalendar(){ this.setState({screen:'calendar',campaignId:null,flightId:null}); },
  openCampaign(id){ this.setState({screen:'campaign',campaignId:id,flightId:null}); },
  openFlight(id){ const r = this.findFlight(id); this.setState({screen:'creative',campaignId:r?r.c.id:null,flightId:id}); },
  back(){ const s = this.state; if(s.screen==='creative') this.setState({screen:'campaign',flightId:null}); else if(s.screen==='campaign') this.setState({screen:'calendar',campaignId:null}); else this.setState({screen:'overview'}); },
  openPdf(){ this.setState({pdfOpen:true,pdfStep:0,pdfReveal:0}); },
  closePdf(){ clearInterval(this._pt); this.setState({pdfOpen:false,pdfStep:0,pdfReveal:0}); },

function viewRoadmap(V){
  const A = App;
  const rm = A.ROADMAPS[V.roadmapKey];
  const tabs = [{k:'90',l:'90-Day'},{k:'6',l:'6-Month'},{k:'12',l:'12-Month'}];
  const colTmpl = '210px repeat(3,1fr)';
  const cellBorder = (last) => `border-bottom:1px solid #E7EBEF;${last?'':'border-right:1px solid #E7EBEF;'}`;
  const phaseHead = `
    <div style="background:#F4F6F8;border-bottom:1px solid #E7EBEF;border-right:1px solid #E7EBEF;padding:12px 14px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#9AA4B0;display:flex;align-items:flex-end;">Track</div>
    ${rm.phases.map((ph,i) => { const c = RM_TONE[ph.tone];
      return `<div style="${cellBorder(i===2)}background:${c}0F;padding:12px 14px;">
        <div style="font-size:11px;font-weight:900;color:${c};letter-spacing:.04em;">${esc(ph.num)}</div>
        <div style="font-size:14px;font-weight:800;letter-spacing:-.015em;color:${c};margin-top:2px;">${esc(ph.name)}</div>
        <div style="font-size:11px;color:#9AA4B0;margin-top:1px;">${esc(ph.range)}</div>
      </div>`; }).join('')}`;
  const msCard = (m) => { const c = RM_TONE[m.tone];
    return `<div style="background:#fff;border:1px solid #EEF1F4;border-left:3px solid ${c};border-radius:10px;padding:11px 12px;margin-bottom:9px;">
      <div style="font-size:12.5px;font-weight:800;letter-spacing:-.01em;">${esc(m.title)}</div>
      <div style="font-size:11px;color:#7A8694;line-height:1.5;margin-top:4px;">${esc(m.body)}</div>
      ${m.tag?`<div style="margin-top:7px;"><span style="font-size:9.5px;font-weight:800;color:${c};background:${c}14;padding:2px 8px;border-radius:999px;letter-spacing:.02em;">${esc(m.tag)}</span></div>`:''}
    </div>`; };
  const trackBlock = (sec) => {
    let out = '';
    if(sec.label){ out += `<div style="grid-column:1 / -1;background:#0B0D10;color:#fff;padding:8px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;border-bottom:1px solid #E7EBEF;">
      <span style="font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;">${esc(sec.label)}</span>
      ${sec.req?`<span style="font-size:10.5px;font-weight:700;color:#FFB3C0;background:#E2455C26;padding:2px 9px;border-radius:999px;">${esc(sec.req)}</span>`:''}</div>`; }
    sec.tracks.forEach(tr => {
      out += `<div style="${cellBorder(false)}padding:13px 14px;background:#FAFBFC;"><div style="font-size:13px;font-weight:800;letter-spacing:-.01em;">${esc(tr.name)}</div><div style="font-size:10.5px;color:#9AA4B0;margin-top:3px;line-height:1.4;">${esc(tr.owner)}</div></div>`;
      tr.cells.forEach((cell,ci) => {
        out += `<div style="${cellBorder(ci===2)}padding:13px 13px 5px;">${(cell.ms||[]).map(msCard).join('')}${cell.gate?`<div style="background:#0B0D10;color:#fff;font-size:11px;font-weight:700;padding:8px 11px;border-radius:9px;margin-bottom:9px;">${esc(cell.gate)}</div>`:''}</div>`;
      });
    });
    return out;
  };
  return `
  <div style="max-width:1480px;margin:0 auto;">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:16px;flex-wrap:wrap;">
      <div>
        <div style="font-size:13px;font-weight:700;color:#00A7DB;letter-spacing:.03em;text-transform:uppercase;margin-bottom:5px;">${esc(rm.eyebrow)}</div>
        <h1 style="font-size:26px;font-weight:800;letter-spacing:-.03em;margin:0;">${esc(rm.title)} <span style="color:#9AA4B0;font-weight:700;">${esc(rm.accent)}</span></h1>
        <div style="font-size:13.5px;color:#67727F;margin-top:4px;max-width:720px;">${esc(rm.sub)}</div>
      </div>
      <div style="display:flex;background:#F0F2F5;border-radius:10px;padding:3px;gap:2px;">
        ${tabs.map(t => { const on = V.roadmapKey===t.k;
          return `<button data-click="${reg(() => A.setRoadmap(t.k))}" style="padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:12.5px;${on?'background:#0B0D10;color:#fff;':'background:transparent;color:#67727F;'}">${esc(t.l)}</button>`; }).join('')}
      </div>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:18px;margin-bottom:16px;">
      ${rm.meta.map(m => `<div><div style="font-size:11px;font-weight:700;color:#9AA4B0;">${esc(m.k)}</div><div style="font-size:13px;font-weight:800;letter-spacing:-.01em;margin-top:1px;">${esc(m.v)}</div></div>`).join('')}
    </div>

    <div style="background:#fff;border:1px solid #E7EBEF;border-radius:16px;overflow:hidden;">
      <div style="overflow-x:auto;">
        <div style="display:grid;grid-template-columns:${colTmpl};min-width:940px;">
          ${phaseHead}
          ${rm.sections.map(trackBlock).join('')}
        </div>
      </div>
    </div>

    ${rm.summary?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px;">
      ${rm.summary.map(s => `<div style="background:#fff;border:1px solid #E7EBEF;border-radius:14px;padding:16px 18px;"><div style="font-size:28px;font-weight:800;letter-spacing:-.035em;color:#00A7DB;line-height:1;">${esc(s.num)}</div><div style="font-size:11.5px;color:#67727F;margin-top:6px;line-height:1.4;">${esc(s.label)}</div></div>`).join('')}
    </div>`:''}
    ${rm.crit?`<div style="background:#FCE7EB;border:1px solid #F6CdD5;border-radius:14px;padding:14px 18px;margin-top:14px;font-size:12.5px;color:#9E2438;line-height:1.5;">${esc(rm.crit)}</div>`:''}
    ${rm.year1?`<div style="font-size:11px;font-weight:800;color:#9AA4B0;letter-spacing:.06em;text-transform:uppercase;margin:22px 0 10px;">Year 1 — what we will have built</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
      ${rm.year1.map(y => `<div style="background:${y.hi?'#E2F6FD':'#fff'};border:1px solid ${y.hi?'#BEE9F7':'#E7EBEF'};border-radius:14px;padding:16px 18px;"><div style="font-size:24px;font-weight:800;letter-spacing:-.035em;color:${y.hi?'#00A7DB':'#33404C'};line-height:1;">${esc(y.v)}</div><div style="font-size:12px;font-weight:700;margin-top:5px;">${esc(y.l)}</div><div style="font-size:10.5px;color:#9AA4B0;margin-top:3px;line-height:1.4;">${esc(y.note)}</div></div>`).join('')}
    </div>`:''}
  </div>`;
}

function viewPdf(V){
  if(!V.pdfOpen) return '';
  let body = '';
  if(V.pdfStep0){
    body = `
      <div>
        <p style="font-size:13.5px;color:#67727F;margin:4px 0 18px;line-height:1.5;">Drop a media plan or brief. Control Room reads it and drafts calendar entries — no manual re-keying.</p>
        <div style="border:2px dashed #D6DCE3;border-radius:14px;padding:22px;display:flex;align-items:center;gap:16px;background:#FAFBFC;">
          <span style="width:48px;height:58px;border-radius:8px;background:#fff;border:1px solid #E7EBEF;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#E2455C;flex-shrink:0;">PDF</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14.5px;font-weight:800;letter-spacing:-.01em;">Chevy_Trax_BackToSchool_Brief.pdf</div>
            <div style="font-size:12px;color:#9AA4B0;margin-top:2px;">14 pages · 2.4 MB · ready to parse</div>
          </div>
          <span style="font-size:11px;font-weight:800;color:#0FA697;background:#E2F5F2;padding:4px 10px;border-radius:999px;">ATTACHED</span>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:22px;">
          <button data-click="${reg(V.closePdf)}" style="border:1px solid #E2E6EB;background:#fff;color:#5A6470;font-weight:700;font-size:13px;padding:10px 18px;border-radius:10px;cursor:pointer;">Cancel</button>
          <button data-click="${reg(V.parseBrief)}" style="border:none;background:#00BCF2;color:#04222B;font-weight:800;font-size:13px;padding:10px 20px;border-radius:10px;cursor:pointer;">Parse brief →</button>
        </div>
      </div>`;
  } else if(V.pdfStep1){
    body = `
      <div>
        <p style="font-size:13.5px;color:#67727F;margin:4px 0 18px;line-height:1.5;">Reading 14 pages — extracting campaign, flights, channels & budget…</p>
        <div style="display:grid;grid-template-columns:150px 1fr;gap:20px;align-items:start;">
          <div style="position:relative;height:200px;border-radius:12px;border:1px solid #E7EBEF;overflow:hidden;background:repeating-linear-gradient(180deg,#fff 0,#fff 13px,#F2F4F7 13px,#F2F4F7 15px);">
            <div style="${css(V.pdfScanStyle)}"></div>
          </div>
          <div>
            <div style="height:7px;border-radius:999px;background:#EEF1F4;overflow:hidden;margin-bottom:14px;"><div style="${css(V.pdfProgressStyle)}"></div></div>
            ${V.pdfFields.map(r => `
              <div style="${css(r.rowStyle)}">
                <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                  <span style="${css(r.checkStyle)}">${esc(r.check)}</span>
                  <span style="font-size:12.5px;color:#9AA4B0;font-weight:600;">${esc(r.label)}</span>
                </div>
                <span style="font-size:12.5px;font-weight:700;color:#0B0D10;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;">${esc(r.value)}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  } else if(V.pdfStep2){
    body = `
      <div>
        <div style="display:flex;align-items:center;gap:9px;margin:6px 0 16px;">
          <span style="width:20px;height:20px;border-radius:50%;background:#E2F5F2;color:#0FA697;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;">✓</span>
          <p style="font-size:13.5px;color:#33404C;margin:0;font-weight:600;">Parsed clean. This campaign & its flights will be added to the calendar.</p>

        <div style="border:1px solid #E7EBEF;border-radius:14px;padding:18px;background:#FAFBFC;">
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px;">
            <span style="width:11px;height:11px;border-radius:50%;background:#2D6FE0;"></span>
            <span style="font-size:16px;font-weight:800;letter-spacing:-.02em;">Chevrolet Trax — Back-to-School</span>
          </div>
          <div style="font-size:12.5px;color:#9AA4B0;margin-bottom:14px;">Chevrolet · Aug 3 – Oct 10, 2026 · $2.8M · source: imported PDF</div>

        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
          <button data-click="${reg(V.closePdf)}" style="border:1px solid #E2E6EB;background:#fff;color:#5A6470;font-weight:700;font-size:13px;padding:10px 18px;border-radius:10px;cursor:pointer;">Cancel</button>

          <span style="width:30px;height:30px;border-radius:8px;background:#E2455C1A;color:#E2455C;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:9.5px;">PDF</span>
          <h2 style="font-size:19px;font-weight:800;margin:0;letter-spacing:-.02em;">Import brief</h2>
        </div>
        <button data-click="${reg(V.closePdf)}" style="border:none;background:#F0F2F5;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:15px;color:#67727F;">✕</button>
      </div>
      ${body}
    </div>
  </div>`;
}

/* ---------- shell + render ---------- */
function buildHTML(V){
  let content = '';
  if(V.isDelivery) content = viewDelivery(V);
  else if(V.isWorkflow) content = viewWorkflow(V);
  else if(V.isStaffing) content = viewStaffing(V);
  else if(V.isRoadmap) content = viewRoadmap(V);
  else if(V.isOverview) content = viewOverview(V);
  else if(V.isCalendar) content = viewCalendar(V);
  else if(V.isCampaign) content = viewCampaign(V);
  else if(V.isCreative) content = viewCreative(V);

  const isTool = V.isOverview || V.isCalendar || V.isCampaign || V.isCreative;
  return `
  <div style="display:flex;height:100vh;width:100%;overflow:hidden;background:#F4F6F8;">
    <div style="width:76px;flex:0 0 76px;background:#0B0D10;display:flex;flex-direction:column;align-items:center;padding:18px 0 16px;gap:6px;z-index:20;">
      <div style="width:44px;height:44px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;">
        <img src="assets/gm-logo.png" alt="GM" style="width:30px;height:30px;display:block;filter:brightness(0);" />
      </div>
      <button data-click="${reg(V.goDelivery)}" title="Delivery Model" style="${css(V.navDeliveryStyle)}">${ICON_DELIVERY}</button>
      <button data-click="${reg(V.goWorkflow)}" title="Tierless Workflow" style="${css(V.navWfStyle)}">${ICON_WF}</button>
      <button data-click="${reg(V.goStaffing)}" title="Staffing Plan" style="${css(V.navStaffStyle)}">${ICON_STAFF}</button>
      <button data-click="${reg(V.goRoadmap)}" title="Roadmap" style="${css(V.navRoadmapStyle)}">${ICON_ROADMAP}</button>
      <div style="width:28px;height:1px;background:#2A2E35;margin:6px 0;"></div>
      <button data-click="${reg(V.goOverview)}" title="Live Example" style="${css(V.navHomeStyle)}">${ICON_HOME}</button>
      <button data-click="${reg(V.goCalendar)}" title="Calendar" style="${css(V.navCalStyle)}">${ICON_CAL}</button>
      <div style="flex:1;"></div>
      <div style="${css(V.roleAvatar.style)}">${esc(V.roleAvatar.text)}</div>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;">
      <header style="height:64px;flex:0 0 64px;background:#fff;border-bottom:1px solid #E7EBEF;display:flex;align-items:center;gap:14px;padding:0 26px;z-index:10;">
        <div style="display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden;flex-shrink:1;">
          ${V.crumbs.map(c => `
            <span style="color:#C4CCD6;margin:0 3px;font-size:13px;">${esc(c.sep)}</span>
            <button data-click="${reg(c.onClick)}" style="${css(c.style)}">${esc(c.label)}</button>`).join('')}
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:16px;">
          ${isTool ? `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 12px 6px 10px;border:1px solid #E7EBEF;border-radius:999px;flex-shrink:0;white-space:nowrap;">
            <span style="width:8px;height:8px;border-radius:50%;background:#0FA697;animation:pulse 1.6s infinite;flex-shrink:0;"></span>
            <span style="font-size:12px;font-weight:600;color:#67727F;">5 sources live</span>
          </div>
          <div style="display:flex;background:#F0F2F5;border-radius:10px;padding:3px;gap:2px;">
            ${V.roles.map(r => `<button data-click="${reg(r.onClick)}" style="${css(r.style)}">${esc(r.label)}</button>`).join('')}
          </div>
          <button data-click="${reg(V.openPdf)}" style="display:flex;align-items:center;gap:7px;background:#00BCF2;border:none;color:#04222B;font-weight:800;font-size:12.5px;padding:9px 15px;border-radius:10px;cursor:pointer;letter-spacing:.005em;">
            ${ICON_PLUS}
            Import brief
          </button>` : `
          <span style="font-size:11px;font-weight:700;color:#9AA4B0;letter-spacing:.04em;border:1px solid #E7EBEF;border-radius:999px;padding:6px 13px;white-space:nowrap;">GM Canada · T1 + T2</span>
          <span style="font-size:11px;font-weight:700;color:#E0902A;background:#FBF0DC;border-radius:999px;padding:6px 13px;white-space:nowrap;">Confidential</span>`}
        </div>
      </header>

      <main data-mainscroll style="flex:1;overflow-y:auto;padding:26px 30px 64px;">
        ${content}
      </main>
    </div>

    ${viewPdf(V)}
  </div>`;
}

let _root, _delegated = false;
function render(){
  if(!_root) _root = document.getElementById('root');
  // preserve scroll across full re-renders
  const prevMain = _root.querySelector('[data-mainscroll]');
  const prevCal = _root.querySelector('[data-calscroll]');
  const mainTop = prevMain ? prevMain.scrollTop : 0;
  const calLeft = prevCal ? prevCal.scrollLeft : 0;

  H = {}; hid = 0;
  const V = App.renderVals();
  _root.innerHTML = buildHTML(V);

  const newMain = _root.querySelector('[data-mainscroll]');
  if(newMain) newMain.scrollTop = mainTop;
  const newCal = _root.querySelector('[data-calscroll]');
  if(newCal) newCal.scrollLeft = calLeft;

  if(!_delegated){
    _root.addEventListener('click', (e) => {
      const el = e.target.closest('[data-click]');
      if(!el) return;
      const fn = H[el.getAttribute('data-click')];
      if(fn) fn(e);
    });
    _delegated = true;
  }
}

render();
App.componentDidMount();
</script>
